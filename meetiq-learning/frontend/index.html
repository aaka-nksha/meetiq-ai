<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeetIQ — AI Meeting Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #16161e;
      --surface2: #1e1e2a;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6ffc;
      --accent2: #a78bfa;
      --green: #22d3a0;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e8e8f0;
      --text2: #9090b0;
      --text3: #606080;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 12px;
      display: flex; flex-direction: column; gap: 4px;
      z-index: 10;
    }

    .logo {
      font-size: 20px; font-weight: 700;
      color: var(--accent2);
      padding: 0 8px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      background: none; border: none;
      color: var(--text2); font-size: 14px; font-weight: 500;
      border-radius: 8px; cursor: pointer; text-align: left;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(124,111,252,0.15); color: var(--accent2); }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 16px; left: 16px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      width: 40px; height: 40px;
      border-radius: 8px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* ── Overlay ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9;
    }
    .sidebar-overlay.visible { display: block; }

    /* ── Main ── */
    .main {
      margin-left: 220px;
      padding: 32px;
      min-height: 100vh;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 12px; font-weight: 600;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 16px;
    }

    /* ── Page Header ── */
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface2);
      margin-bottom: 16px;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(124,111,252,0.05); }
    .upload-zone.has-file { border-color: var(--green); }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .upload-sub { font-size: 13px; color: var(--text2); }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text2); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a5de8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
    }
    .badge-queued      { background: rgba(144,144,176,0.15); color: var(--text2); }
    .badge-transcribing{ background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .badge-analysing   { background: rgba(124,111,252,0.15); color: var(--accent2); }
    .badge-done        { background: rgba(34,211,160,0.15);  color: var(--green); }
    .badge-error       { background: rgba(248,113,113,0.15); color: var(--red); }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }

    /* ── Stat Cards ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-val { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .stat-lbl { font-size: 13px; color: var(--text2); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 16px; font-size: 14px; font-weight: 500;
      background: none; border: none; cursor: pointer;
      color: var(--text2); border-bottom: 2px solid transparent;
      margin-bottom: -1px; font-family: inherit; transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* ── Action Items ── */
    .action-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; border-radius: 8px;
      background: var(--surface2); margin-bottom: 8px;
    }
    .action-task { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .action-meta {
      font-size: 12px; color: var(--text3);
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .priority-High   { color: var(--red);    font-weight: 600; }
    .priority-Medium { color: var(--yellow); font-weight: 600; }
    .priority-Low    { color: var(--green);  font-weight: 600; }

    /* ── Summary Bullets ── */
    .summary-bullet {
      display: flex; gap: 10px;
      font-size: 14px; line-height: 1.6;
      margin-bottom: 10px;
    }
    .bullet-dot { color: var(--accent2); flex-shrink: 0; }

    /* ── Score Bars ── */
    .score-bar { margin-bottom: 12px; }
    .score-bar-top {
      display: flex; justify-content: space-between;
      font-size: 13px; margin-bottom: 6px;
      text-transform: capitalize;
    }
    .score-bar-track {
      height: 6px; background: var(--surface2);
      border-radius: 999px; overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 999px; }

    /* ── Email Cards ── */
    .email-card {
      border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 12px;
    }
    .email-header {
      padding: 12px 16px; background: var(--surface2);
      display: flex; justify-content: space-between;
      align-items: center; font-size: 13px; flex-wrap: wrap; gap: 8px;
    }
    .email-body {
      padding: 16px; font-size: 13px;
      line-height: 1.7; color: var(--text2);
      white-space: pre-wrap;
    }

    /* ── Meeting Row ── */
    .meeting-row {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer; transition: all 0.15s;
      margin-bottom: 10px;
    }
    .meeting-row:hover { border-color: var(--accent); }

    /* ── Transcript ── */
    .transcript-box {
      background: var(--surface2); border-radius: 10px;
      padding: 16px; font-size: 13px; line-height: 1.8;
      color: var(--text2); max-height: 400px; overflow-y: auto;
      white-space: pre-wrap; font-family: monospace;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Processing Banner ── */
    .processing-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: 10px;
      border: 1px solid var(--accent);
      background: rgba(124,111,252,0.08);
      margin-bottom: 20px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulsing { animation: pulse 1.5s ease-in-out infinite; }

    /* ── Empty State ── */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
    .empty-sub { color: var(--text2); font-size: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; z-index: 999;
      animation: slideup 0.25s ease;
    }
    .toast-success { background: var(--green); color: #000; }
    .toast-error   { background: var(--red);   color: #fff; }
    @keyframes slideup {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:none; }
    }

    /* ── Responsive ── */
    @media(max-width:768px) {
      .hamburger { display: flex; }
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 16px; padding-top: 60px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Hamburger -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="logo">🎙️ MeetIQ</div>
  <button class="nav-btn active" id="nav-upload" onclick="showPage('upload')">
    ⬆️ Upload Meeting
  </button>
  <button class="nav-btn" id="nav-meetings" onclick="showPage('meetings')">
    📋 All Meetings
  </button>
</nav>

<!-- Overlay -->
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Main -->
<main class="main" id="main-content"></main>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<script>
const API = 'http://localhost:8000';
let pollTimer = null;
let selectedFile = null;

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ── Sidebar Toggle ─────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
}

// ── Navigation ─────────────────────────────────────────────────
function showPage(page) {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${page}`)?.classList.add('active');
  if (page === 'upload')   renderUpload();
  if (page === 'meetings') renderMeetings();
}

function scoreColor(s) {
  if (s >= 80) return '#22d3a0';
  if (s >= 60) return '#fbbf24';
  return '#f87171';
}

// ══════════════════════════════════════════════════════════════
// PAGE 1 — UPLOAD
// ══════════════════════════════════════════════════════════════
function renderUpload() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Upload Meeting</div>
    <div class="page-sub">Upload audio → AI transcribes, extracts action items, scores quality and drafts emails</div>

    <div class="grid-2" style="align-items:start">
      <div>
        <div class="upload-zone" id="drop-zone"
          onclick="document.getElementById('file-input').click()">
          <div class="upload-icon" id="upload-icon">🎙️</div>
          <div class="upload-title" id="upload-title">Drop audio file here</div>
          <div class="upload-sub" id="upload-sub">
            MP3, WAV, M4A, MP4, OGG • Click to browse
          </div>
          <input type="file" id="file-input"
            accept=".mp3,.wav,.m4a,.mp4,.ogg,.webm"
            style="display:none" onchange="handleFileSelect(this)"/>
        </div>
        <div style="padding:12px 16px; background:var(--surface2);
          border-radius:10px; border:1px solid var(--border);
          font-size:13px; color:var(--text2);">
          💡 <strong style="color:var(--text)">No audio file?</strong>
          The app uses a built-in demo transcript automatically.
        </div>
      </div>

      <div class="card">
        <div class="card-title">Meeting Details</div>
        <div class="form-group">
          <label class="form-label">Meeting Title</label>
          <input class="form-input" id="meeting-title"
            placeholder="e.g. Q3 Product Sync"/>
        </div>
        <div class="form-group">
          <label class="form-label">Attendee Emails</label>
          <input class="form-input" id="meeting-attendees"
            placeholder="rahul@co.com, priya@co.com"/>
          <div class="form-hint">
            Comma separated • Leave blank to skip emails
          </div>
        </div>
        <button class="btn btn-primary" id="upload-btn"
          style="width:100%; justify-content:center; margin-top:8px"
          onclick="uploadMeeting()" disabled>
          🚀 Analyse Meeting
        </button>
      </div>
    </div>`;

  const zone = document.getElementById('drop-zone');
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.style.borderColor = 'var(--accent)';
  });
  zone.addEventListener('dragleave', () => {
    zone.style.borderColor = '';
  });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = '';
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
}

function handleFileSelect(input) {
  if (input.files[0]) setFile(input.files[0]);
}

function setFile(file) {
  selectedFile = file;
  document.getElementById('upload-icon').textContent = '✅';
  document.getElementById('upload-title').textContent = file.name;
  document.getElementById('upload-sub').textContent =
    `${(file.size/1024/1024).toFixed(1)} MB • Click to change`;
  document.getElementById('drop-zone').classList.add('has-file');
  document.getElementById('upload-btn').disabled = false;
  if (!document.getElementById('meeting-title').value) {
    document.getElementById('meeting-title').value =
      file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
  }
}

async function uploadMeeting() {
  if (!selectedFile) return;
  const title = document.getElementById('meeting-title').value || 'Meeting';
  const attendees = document.getElementById('meeting-attendees').value;
  const btn = document.getElementById('upload-btn');

  // DEBUG — check what's actually being read
  console.log('🔍 DEBUG — Title:', title);
  alert('Title: ' + title + '\nAttendees: ' + attendees);
  console.log('🔍 DEBUG — Attendees:', attendees);
  console.log('🔍 DEBUG — File:', selectedFile.name);

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Uploading...';

  try {
    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('title', title);
    fd.append('attendees', attendees);

    // DEBUG — check FormData contents
    for (let pair of fd.entries()) {
      console.log('🔍 FormData:', pair[0], '=', pair[1]);
    }

    const res = await fetch(`${API}/upload-meeting`, {
      method: 'POST', body: fd
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    showToast('✅ Uploaded! Analysis started.');
    selectedFile = null;
    renderMeetingDetail(data.meeting_id);

  } catch(e) {
    showToast('❌ ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '🚀 Analyse Meeting';
  }
}

// ══════════════════════════════════════════════════════════════
// PAGE 2 — MEETING DETAIL
// ══════════════════════════════════════════════════════════════
async function renderMeetingDetail(meetingId, activeTab='summary') {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:40px">
      <div class="spinner"></div> Loading...
    </div>`;

  let meeting;
  try {
    const res = await fetch(`${API}/meeting/${meetingId}`);
    meeting = await res.json();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div style="color:var(--red);padding:20px">
        ❌ Cannot connect to backend. Is the server running?
      </div>`;
    return;
  }

  const processing = ['queued','transcribing','analysing'].includes(meeting.status);

  document.getElementById('main-content').innerHTML = `

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:12px;
      margin-bottom:24px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="showPage('meetings')">← Back</button>
      <div style="flex:1;min-width:200px">
        <div class="page-title">${meeting.title}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap">
          <span class="badge badge-${meeting.status}">${meeting.status}</span>
          <span style="font-size:11px;font-family:monospace;
            color:var(--accent2);
            background:rgba(124,111,252,0.08);
            padding:2px 8px;border-radius:4px;
            border:1px solid rgba(124,111,252,0.2)">
            ID: ${meeting.id}
          </span>
        </div>
      </div>
    </div>

    <!-- Processing Banner -->
    ${processing ? `
      <div class="processing-banner">
        <div class="spinner pulsing"></div>
        <div>
          <div style="font-weight:600">AI is processing your meeting...</div>
          <div style="color:var(--text2);font-size:13px;margin-top:2px">
            ${meeting.status === 'transcribing'
              ? '🎙️ Transcribing audio with Groq Whisper...'
              : meeting.status === 'analysing'
              ? '🤖 Running AI agents...'
              : '⏳ Queued — starting soon...'}
          </div>
        </div>
      </div>` : ''}

    <!-- Stats -->
    ${meeting.status === 'done' ? `
      <div class="grid-3" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-val" style="color:${scoreColor(meeting.health_score)}">
            ${meeting.health_score}/100
          </div>
          <div class="stat-lbl">Health Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:var(--accent2)">
            ${meeting.action_items?.length || 0}
          </div>
          <div class="stat-lbl">Action Items</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:var(--green)">
            ${meeting.attendees?.length || 0}
          </div>
          <div class="stat-lbl">Attendees</div>
        </div>
      </div>` : ''}

    <!-- Tabs -->
    ${meeting.status === 'done' ? `
      <div class="tabs">
        <button class="tab ${activeTab==='summary'    ?'active':''}"
          onclick="renderMeetingDetail('${meetingId}','summary')">
          📝 Summary
        </button>
        <button class="tab ${activeTab==='actions'    ?'active':''}"
          onclick="renderMeetingDetail('${meetingId}','actions')">
          ✅ Actions (${meeting.action_items?.length||0})
        </button>
        <button class="tab ${activeTab==='health'     ?'active':''}"
          onclick="renderMeetingDetail('${meetingId}','health')">
          📊 Health
        </button>
        <button class="tab ${activeTab==='emails'     ?'active':''}"
          onclick="renderMeetingDetail('${meetingId}','emails')">
          📧 Emails (${meeting.email_drafts?.length||0})
        </button>
        <button class="tab ${activeTab==='transcript' ?'active':''}"
          onclick="renderMeetingDetail('${meetingId}','transcript')">
          💬 Transcript
        </button>
      </div>` : ''}

    <!-- Tab Content -->
    <div id="tab-content">
      ${meeting.status === 'done'  ? renderTab(meeting, activeTab) : ''}
      ${meeting.status === 'error' ? `
        <div class="card" style="border-color:var(--red)">
          <div style="color:var(--red);font-weight:600;margin-bottom:8px">
            ❌ Processing failed
          </div>
          <div style="font-size:13px;color:var(--text2)">
            ${meeting.error || 'Unknown error'}
          </div>
        </div>` : ''}
    </div>`;

  if (processing) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      const r = await fetch(`${API}/meeting/${meetingId}`);
      const m = await r.json();
      if (!['queued','transcribing','analysing'].includes(m.status)) {
        clearInterval(pollTimer);
        pollTimer = null;
        renderMeetingDetail(meetingId, 'summary');
        if (m.status === 'done')  showToast('✅ Analysis complete!');
        if (m.status === 'error') showToast('❌ Processing failed', 'error');
      }
    }, 3000);
  }
}

function renderTab(meeting, tab) {

  if (tab === 'summary') {
    const bullets = (meeting.summary||'').split('\n').filter(l => l.trim());
    return `
      <div class="card">
        <div class="card-title">Meeting Summary</div>
        ${bullets.map(line => `
          <div class="summary-bullet">
            <span class="bullet-dot">▸</span>
            <span>${line.replace(/^[•\-\*]\s*/,'')}</span>
          </div>`).join('')}
      </div>`;
  }

  if (tab === 'actions') {
    const items = meeting.action_items || [];
    return `
      <div class="card">
        <div class="card-title">Action Items</div>
        ${items.length === 0
          ? '<div style="color:var(--text2);font-size:14px;padding:20px 0">No action items found</div>'
          : items.map(item => `
            <div class="action-item">
              <div style="font-size:18px;margin-top:1px;flex-shrink:0">☐</div>
              <div style="flex:1;min-width:0">
                <div class="action-task">${item.task}</div>
                <div class="action-meta">
                  <span style="color:var(--accent2)">👤 ${item.owner||'TBD'}</span>
                  <span>📅 ${item.deadline||'TBD'}</span>
                  <span class="priority-${item.priority}">${item.priority}</span>
                </div>
              </div>
            </div>`).join('')}
      </div>`;
  }

  if (tab === 'health') {
    const bd = meeting.health_breakdown || {};
    const breakdown = bd.breakdown || {};
    return `
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Score Breakdown</div>
          ${Object.entries(breakdown).map(([key,val]) => `
            <div class="score-bar">
              <div class="score-bar-top">
                <span>${key.replace(/_/g,' ')}</span>
                <strong style="color:${scoreColor(val)}">${val}</strong>
              </div>
              <div class="score-bar-track">
                <div class="score-bar-fill"
                  style="width:${val}%;background:${scoreColor(val)}">
                </div>
              </div>
            </div>`).join('')}
        </div>
        <div>
          <div class="card" style="margin-bottom:12px">
            <div class="card-title">✅ Strengths</div>
            ${(bd.strengths||[]).map(s => `
              <div style="font-size:14px;margin-bottom:8px;display:flex;gap:8px">
                <span style="color:var(--green);flex-shrink:0">✓</span> ${s}
              </div>`).join('')}
          </div>
          <div class="card">
            <div class="card-title">💡 Improvements</div>
            ${(bd.improvements||[]).map(s => `
              <div style="font-size:14px;margin-bottom:8px;display:flex;gap:8px">
                <span style="color:var(--yellow);flex-shrink:0">→</span> ${s}
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  }

  if (tab === 'emails') {
    const drafts = meeting.email_drafts || [];
    return drafts.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No email drafts</div>
        <div class="empty-sub">
          Add attendee emails when uploading to generate follow-ups
        </div>
      </div>` :
      drafts.map(d => `
        <div class="email-card">
          <div class="email-header">
            <div>
              <strong>${d.to}</strong>
              <div style="color:var(--text3);margin-top:2px;font-size:12px">
                ${d.subject}
              </div>
            </div>
            <span style="color:var(--green);font-size:12px">
              ${d.personal_tasks?.length||0} personal tasks
            </span>
          </div>
          <div class="email-body">${d.body}</div>
        </div>`).join('');
  }

  if (tab === 'transcript') {
    return `
      <div class="card">
        <div class="card-title">Raw Transcript</div>
        <div class="transcript-box">
          ${meeting.transcript || 'No transcript available'}
        </div>
      </div>`;
  }

  return '';
}

// ══════════════════════════════════════════════════════════════
// PAGE 3 — ALL MEETINGS
// ══════════════════════════════════════════════════════════════
async function renderMeetings() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">All Meetings</div>
    <div class="page-sub" id="meetings-sub">Loading...</div>
    <div id="meetings-list"></div>`;

  try {
    const res = await fetch(`${API}/meetings`);
    const meetings = await res.json();

    document.getElementById('meetings-sub').textContent =
      `${meetings.length} meeting${meetings.length !== 1 ? 's' : ''} analysed`;

    if (meetings.length === 0) {
      document.getElementById('meetings-list').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎙️</div>
          <div class="empty-title">No meetings yet</div>
          <div class="empty-sub">Upload your first meeting to get started</div>
        </div>`;
      return;
    }

    document.getElementById('meetings-list').innerHTML =
      meetings.map(m => `
        <div class="meeting-row" onclick="renderMeetingDetail('${m.id}')">

          <!-- Score Circle -->
          <div style="
            width:56px;height:56px;border-radius:50%;flex-shrink:0;
            background:${m.health_score
              ? scoreColor(m.health_score)+'20'
              : 'var(--surface)'};
            color:${m.health_score
              ? scoreColor(m.health_score)
              : 'var(--text3)'};
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;font-weight:700">
            ${m.health_score
              ? `<div style="font-size:18px">${m.health_score}</div>
                 <div style="font-size:10px">score</div>`
              : `<div style="font-size:20px">⏳</div>`}
          </div>

          <!-- Info -->
          <div style="flex:1;min-width:0">

            <!-- Title -->
            <div style="font-weight:600;font-size:15px;margin-bottom:4px;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${m.title}
            </div>

            <!-- Meeting ID badge -->
            <div style="margin-bottom:6px">
              <span style="
                font-size:11px;font-family:monospace;
                color:var(--accent2);
                background:rgba(124,111,252,0.08);
                padding:2px 8px;border-radius:4px;
                border:1px solid rgba(124,111,252,0.2)">
                ID: ${m.id}
              </span>
            </div>

            <!-- Meta -->
            <div style="font-size:12px;color:var(--text2);
              display:flex;gap:12px;flex-wrap:wrap">
              <span>✅ ${m.action_items_count||0} action items</span>
              <span>👤 ${m.attendees?.length||0} attendees</span>
              <span>🕒 ${m.created_at
                ? new Date(m.created_at).toLocaleDateString('en-GB', {
                    day:'numeric', month:'short', year:'numeric',
                    hour:'2-digit', minute:'2-digit'
                  })
                : 'Unknown date'}</span>
            </div>
          </div>

          <!-- Status -->
          <div style="text-align:right;flex-shrink:0">
            <span class="badge badge-${m.status}">${m.status}</span>
          </div>

        </div>`).join('');

  } catch(e) {
    document.getElementById('meetings-list').innerHTML = `
      <div style="color:var(--red);padding:20px">
        ❌ Cannot connect to backend. Make sure server is running on port 8000.
      </div>`;
  }
}
